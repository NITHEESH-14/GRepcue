<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 160" width="100%">
  <rect width="100%" height="100%" fill="#0B0F19" rx="8"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="20%" stop-color="#78909C" />
      <stop offset="40%" stop-color="#60A5FA" />
      <stop offset="60%" stop-color="#38BDF8" />
      <stop offset="80%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
  </defs>
  <text x="35" font-family="monospace" font-size="10.5" font-weight="bold" fill="url(#grad)" xml:space="preserve">
    <tspan x="35" dy="30">   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җ  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җв–Ҳв–Ҳв”җ   в–Ҳв–Ҳв”җв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җ</tspan>
    <tspan x="35" dy="18">  в–Ҳв–Ҳв”Ңв”Җв”Җв”Җв”Җв”ҳ в–Ҳв–Ҳв”Ңв”Җв”Җв–Ҳв–Ҳв”җв–Ҳв–Ҳв”Ңв”Җв”Җв”Җв”Җв”ҳв–Ҳв–Ҳв”Ңв”Җв”Җв–Ҳв–Ҳв”җв–Ҳв–Ҳв”Ңв”Җв”Җв”Җв”Җв”ҳв–Ҳв–Ҳв”Ӯ   в–Ҳв–Ҳв”Ӯв–Ҳв–Ҳв”Ңв”Җв”Җв”Җв”Җв”ҳ</tspan>
    <tspan x="35" dy="18">  в–Ҳв–Ҳв”Ӯ  в–Ҳв–Ҳв–Ҳв”җв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”Ңв”ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җ  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”Ңв”ҳв–Ҳв–Ҳв”Ӯ     в–Ҳв–Ҳв”Ӯ   в–Ҳв–Ҳв”Ӯв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җ  </tspan>
    <tspan x="35" dy="18">  в–Ҳв–Ҳв”Ӯ   в–Ҳв–Ҳв”Ӯв–Ҳв–Ҳв”Ңв”Җв”Җв–Ҳв–Ҳв”җв–Ҳв–Ҳв”Ңв”Җв”Җв”ҳ  в–Ҳв–Ҳв”Ңв”Җв”Җв”Җв”ҳ в–Ҳв–Ҳв”Ӯ     в–Ҳв–Ҳв”Ӯ   в–Ҳв–Ҳв”Ӯв–Ҳв–Ҳв”Ңв”Җв”Җв”ҳ  </tspan>
    <tspan x="35" dy="18">  в””в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”Ңв”ҳв–Ҳв–Ҳв”Ӯ  в–Ҳв–Ҳв”Ӯв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җв–Ҳв–Ҳв”Ӯ     в””в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җв””в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”Ңв”ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв”җ</tspan>
    <tspan x="35" dy="18">   в””в”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”ҳ  в””в”Җв”ҳв””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳв””в”Җв”ҳ      в””в”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ</tspan>
  </text>
</svg>
